<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish - Dori Qidiruv</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0d1b3e 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .app-name {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4fc3f7, #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 3rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .phone-input-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }

        .prefix {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: #4fc3f7;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .phone-input {
            width: 100%;
            padding: 1.2rem 1.5rem 1.2rem 5.5rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .phone-input:focus {
            border-color: #4fc3f7;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(79, 195, 247, 0.3);
        }

        .phone-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            border: none;
            background: linear-gradient(135deg, #4fc3f7, #7c4dff);
            color: white;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 195, 247, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .back-link {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #4fc3f7;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .lang-switch {
            display: flex;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.3rem;
            border-radius: 20px;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .lang-btn {
            padding: 0.4rem 1rem;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #4fc3f7, #7c4dff);
            color: white;
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 2.5rem 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .phone-input {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">💊</div>
        <div class="app-name">Dori Qidiruv</div>
        
        <div class="glass-card">
            <div class="lang-switch">
                <button class="lang-btn active" onclick="setLang('uz')">UZ</button>
                <button class="lang-btn" onclick="setLang('ru')">RU</button>
            </div>

            <h1 data-uz="Telefon raqamingizni kiriting" data-ru="Введите номер телефона">Telefon raqamingizni kiriting</h1>
            <p class="subtitle" data-uz="Tasdiqlash kodi yuboriladi" data-ru="Вам будет отправлен код подтверждения">Tasdiqlash kodi yuboriladi</p>
            
            <form id="loginForm" onsubmit="handleSubmit(event)">
                <div class="phone-input-wrapper">
                    <span class="prefix">+998</span>
                    <input 
                        type="tel" 
                        class="phone-input" 
                        id="phoneInput" 
                        placeholder="00 000 00 00"
                        maxlength="12"
                        autocomplete="off"
                        required
                    >
                </div>
                <p class="error-message" id="errorMessage">Iltimos, to'g'ri raqam kiriting</p>
                
                <button type="submit" class="submit-btn" id="submitBtn" data-uz="Kod yuborish" data-ru="Отправить код">Kod yuborish</button>
                <a href="index.html" class="back-link" data-uz="← Bosh sahifaga qaytish" data-ru="← Вернуться на главную">← Bosh sahifaga qaytish</a>
            </form>
        </div>
    </div>

    <script>
        let currentLang = 'uz';

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.querySelectorAll('[data-uz]').forEach(el => {
                el.textContent = el.getAttribute('data-' + lang);
            });
        }

        const phoneInput = document.getElementById('phoneInput');
        const errorMessage = document.getElementById('errorMessage');

        phoneInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            
            if (value.length > 9) {
                value = value.slice(0, 9);
            }

            let formatted = '';
            if (value.length > 0) {
                formatted = value.slice(0, 2);
            }
            if (value.length > 2) {
                formatted += ' ' + value.slice(2, 5);
            }
            if (value.length > 5) {
                formatted += ' ' + value.slice(5, 7);
            }
            if (value.length > 7) {
                formatted += ' ' + value.slice(7, 9);
            }

            e.target.value = formatted;
            errorMessage.classList.remove('show');
        });

        async function handleSubmit(e) {
            e.preventDefault();

            const phone = phoneInput.value.replace(/\s/g, '');

            if (phone.length !== 9) {
                errorMessage.textContent = currentLang === 'uz'
                    ? 'Iltimos, to\'g\'ri raqam kiriting'
                    : 'Пожалуйста, введите правильный номер';
                errorMessage.classList.add('show');
                return;
            }

            const fullPhone = '+998' + phone;

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = currentLang === 'uz' ? 'Yuborilmoqda...' : 'Отправка...';

            try {
                const response = await fetch('/api/auth/send-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber: fullPhone })
                });
                const data = await response.json();

                if (!response.ok) {
                    errorMessage.textContent = data.message || (currentLang === 'uz' ? 'Xatolik yuz berdi' : 'Произошла ошибка');
                    errorMessage.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.textContent = currentLang === 'uz' ? 'Kod yuborish' : 'Отправить код';
                    return;
                }

                localStorage.setItem('phone', fullPhone);
                window.location.href = 'sms.html';
            } catch (error) {
                errorMessage.textContent = currentLang === 'uz'
                    ? 'Serverga ulanib bo\'lmadi. Qayta urinib ko\'ring.'
                    : 'Не удалось подключиться к серверу. Попробуйте снова.';
                errorMessage.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = currentLang === 'uz' ? 'Kod yuborish' : 'Отправить код';
            }
        }

        phoneInput.focus();
    </script>
</body>
</html>
