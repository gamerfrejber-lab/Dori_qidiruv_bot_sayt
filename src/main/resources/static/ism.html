<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ism kiriting - Dori Qidiruv</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0d1b3e 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .name-container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: wave 2s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(20deg); }
            75% { transform: rotate(-20deg); }
        }

        .app-name {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4fc3f7, #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 3rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .name-input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 2rem;
        }

        .name-input:focus {
            border-color: #4fc3f7;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(79, 195, 247, 0.3);
        }

        .name-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            border: none;
            background: linear-gradient(135deg, #4fc3f7, #7c4dff);
            color: white;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 195, 247, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .lang-switch {
            display: flex;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.3rem;
            border-radius: 20px;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .lang-btn {
            padding: 0.4rem 1rem;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #4fc3f7, #7c4dff);
            color: white;
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 2.5rem 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="name-container">
        <div class="logo">👋</div>
        <div class="app-name">Dori Qidiruv</div>
        
        <div class="glass-card">
            <div class="lang-switch">
                <button class="lang-btn active" onclick="setLang('uz')">UZ</button>
                <button class="lang-btn" onclick="setLang('ru')">RU</button>
            </div>

            <h1 data-uz="Ismingizni kiriting" data-ru="Введите ваше имя">Ismingizni kiriting</h1>
            <p class="subtitle" data-uz="Sizni qanday chaqiramiz?" data-ru="Как мы можем к вам обращаться?">Sizni qanday chaqiramiz?</p>
            
            <form id="nameForm" onsubmit="handleSubmit(event)">
                <input 
                    type="text" 
                    class="name-input" 
                    id="nameInput" 
                    placeholder="Ismingiz..."
                    data-placeholder-uz="Ismingiz..."
                    data-placeholder-ru="Ваше имя..."
                    autocomplete="off"
                    required
                >
                <p class="error-message" id="errorMessage" data-uz="Iltimos, ismingizni kiriting" data-ru="Пожалуйста, введите ваше имя">Iltimos, ismingizni kiriting</p>
                
                <button type="submit" class="submit-btn" id="submitBtn" data-uz="Davom etish" data-ru="Продолжить">Davom etish</button>
            </form>
        </div>
    </div>

    <script>
        let currentLang = 'uz';

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.querySelectorAll('[data-uz]').forEach(el => {
                if (el.tagName === 'INPUT') {
                    el.placeholder = el.getAttribute('data-placeholder-' + lang);
                } else {
                    el.textContent = el.getAttribute('data-' + lang);
                }
            });
        }

        const nameInput = document.getElementById('nameInput');
        const errorMessage = document.getElementById('errorMessage');
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = 'login.html';
        } else {
            fetch('/api/auth/profile', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
                .then(response => response.ok ? response.json() : Promise.reject())
                .then(user => {
                    if (user.name && user.name.trim().length >= 2) {
                        window.location.href = 'index.html';
                    }
                })
                .catch(() => { /* profilni olib bo'lmadi - foydalanuvchi ismini shu yerda kiritadi */ });
        }

        nameInput.addEventListener('input', () => {
            errorMessage.classList.remove('show');
        });

        async function handleSubmit(e) {
            e.preventDefault();

            const name = nameInput.value.trim();

            if (name.length < 2) {
                errorMessage.textContent = currentLang === 'uz'
                    ? 'Iltimos, to\'liq ismingizni kiriting'
                    : 'Пожалуйста, введите ваше полное имя';
                errorMessage.classList.add('show');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = currentLang === 'uz' ? 'Saqlanmoqda...' : 'Сохранение...';

            try {
                const response = await fetch('/api/auth/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ name })
                });

                if (!response.ok) {
                    errorMessage.textContent = currentLang === 'uz' ? 'Xatolik yuz berdi' : 'Произошла ошибка';
                    errorMessage.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.textContent = currentLang === 'uz' ? 'Davom etish' : 'Продолжить';
                    return;
                }

                localStorage.setItem('userName', name);
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'index.html';
            } catch (error) {
                errorMessage.textContent = currentLang === 'uz'
                    ? 'Serverga ulanib bo\'lmadi. Qayta urinib ko\'ring.'
                    : 'Не удалось подключиться к серверу. Попробуйте снова.';
                errorMessage.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = currentLang === 'uz' ? 'Davom etish' : 'Продолжить';
            }
        }

        nameInput.focus();
    </script>
</body>
</html>
