spring.application.name=Dori_Qidiruv_bot
server.port=8080

# Umumiy Postgres baza (bot va veb-sayt bir xil bazani ishlatadi).
# Render'da SPRING_DATASOURCE_URL/USERNAME/PASSWORD environment variable orqali beriladi
# (Spring Boot ularni avtomatik spring.datasource.*ga bog'laydi).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=dori-qidiruv-bot-secret-key-minimum-256-bits-required-for-hs256-algorithm-secure-key
jwt.expiration=86400000

# Admin sifatida yozish huquqiga ega telefon raqamlar (vergul bilan ajratilgan)
app.admin-phones=+998950792008

# Eskiz.uz SMS integratsiyasi (https://notify.eskiz.uz)
# email/password bo'sh bo'lsa, tizim test rejimida ishlaydi (kod faqat logga yoziladi)
eskiz.base-url=https://notify.eskiz.uz/api
eskiz.email=${ESKIZ_EMAIL:}
eskiz.password=${ESKIZ_PASSWORD:}
eskiz.from=4546

# Telegram bot orqali kod yuborish (D:\G59\boot loyihasidagi NotifyServer).
# Token bot.properties/.env (yoki Render'dagi INTERNAL_TOKEN environment variable) bilan bir xil bo'lishi kerak.
# Lokalda ishlashda standart qiymat (127.0.0.1) ishlatiladi; Render'da TELEGRAM_NOTIFY_URL
# environment variable orqali bot xizmatining ichki (private service) manziliga o'zgartiriladi.
telegram.notify.url=${TELEGRAM_NOTIFY_URL:http://127.0.0.1:8091/send-code}
telegram.notify.token=${TELEGRAM_NOTIFY_TOKEN:dori-b2b-ichki-boglanish-tokeni-9f3a7c}
telegram.bot-username=dori_UzBot

# Logging
logging.level.com.example.dori_qidiruv_bot=INFO
logging.level.org.springframework.security=DEBUG